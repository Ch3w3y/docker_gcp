site_name: R to the Cloud
site_description: >
  A practical guide for public sector analysts moving from local R and RStudio
  to GitHub, Docker, and Google Cloud Platform — no prior DevOps experience needed.
site_url: https://ch3w3y.github.io/docker_gcp
repo_url: https://github.com/Ch3w3y/docker_gcp
repo_name: Ch3w3y/docker_gcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - tables
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - md_in_html
  - def_list

plugins:
  - search:
      lang: en
  - panzoom:
      include_selectors:
        - ".mermaid"
      full_screen: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ch3w3y/docker_gcp

nav:
  - Home: index.md

  - "Why Change?":
    - "The Case for Modern Workflows": case-for-change.md
    - "The IT & Governance Toolkit": it-governance.md

  - "From Notebooks to Pipelines":
    - "Organising Your R Code": code-organisation.md
    - "Writing Functions": writing-functions.md
    - "Building R Packages": r-packages.md
    - "Writing Tests": testing-guide.md

  - "Git & GitHub":
    - "From Shared Drives to Git": from-shares-to-git.md
    - "What Is Version Control?": git-fundamentals.md
    - "The GitHub Workflow": git-workflow.md
    - "Removing Secrets and Hardcoded Paths": code-readiness.md
    - "Writing Portable, Safe Code": code-sanitisation.md
    - "Data Security for Cloud RAP": data-security.md

  - "Linux & WSL2":
    - "What Is Linux?": what-is-linux.md
    - "Setting Up WSL2": wsl-setup.md
    - "Positron IDE": positron-setup.md

  - "Docker & Environments":
    - "Containers Explained": docker-containers.md
    - "Managing R & Python Versions": version-management.md

  - "Worked Example":
    - "AMR Surveillance Pipeline": example-walkthrough.md
    - "Implementation Examples in R": r-implementation.md
    - "Generating and Sharing Outputs": outputs-and-reporting.md
    - "Workshop Setup": workshop-setup.md

  - "Cloud Deployment":
    - "How the Pipeline Works": architecture.md
    - "GitHub Actions Explained": github-actions.md
    - "GCP Deployment": gcp-deployment.md
    - "Demo Resources Setup": demo-setup.md

  - "Reference":
    - "Troubleshooting": troubleshooting.md
    - "Glossary": glossary.md
