name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "gcp-etl/**"
      - "gcp-app/**"
      - ".github/workflows/build-ghcr.yml"
  workflow_dispatch:   # manual trigger — run from Actions tab to get an image on demand

jobs:
  build-ghcr:
    name: Build ${{ matrix.image }} → ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    strategy:
      fail-fast: false
      matrix:
        image:
          - gcp-etl
          - gcp-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
