name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write          # needed to push to GHCR
      id-token: write          # needed for Workload Identity Federation

    strategy:
      fail-fast: false
      matrix:
        image:
          - gcp-etl
          - gcp-app

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # GCP authentication — WIF preferred, SA key as fallback
      # -----------------------------------------------------------------------
      - name: Authenticate to GCP (WIF)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GCP (SA key fallback)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # -----------------------------------------------------------------------
      # Configure Docker for Artifact Registry
      # -----------------------------------------------------------------------
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # -----------------------------------------------------------------------
      # Compute short SHA for image tags
      # -----------------------------------------------------------------------
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Log in to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Set up Docker Buildx
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Build and push
      # -----------------------------------------------------------------------
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/${{ matrix.image }}:latest
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.actor }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.actor }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
